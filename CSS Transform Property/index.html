<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSS Transform Playground | Learn CSS Transform Properties</title>

<meta name="description"
    content="An interactive showcase of CSS Transform properties including scale, rotate, translate, skew, matrix, and 3D transformations. Built with HTML and CSS for learning and practice.">

<meta name="keywords"
    content="CSS Transform, CSS3, HTML, Web Development, Scale, Rotate, Translate, Skew, Matrix, 3D Transformations, Frontend Development">

<meta name="author" content="Rahul Raj">

<meta property="og:title" content="CSS Transform Playground">
<meta property="og:description"
    content="Explore and learn CSS Transform properties through interactive examples and animations.">
<meta property="og:type" content="website">

<meta name="robots" content="index, follow">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>CSS Transform Playground</h1>

  <div class="container">

    <div class="card">
      <div class="box scaleX">scaleX</div>
    </div>
    <div class="card">
      <div class="box scaleY">scaleY</div>
    </div>
    <div class="card">
      <div class="box scale">scale</div>
    </div>
    <div class="card">
      <div class="box translateX">translateX</div>
    </div>
    <div class="card">
      <div class="box translateY">translateY</div>
    </div>
    <div class="card">
      <div class="box translate">translate</div>
    </div>
    <div class="card">
      <div class="box matrix">matrix</div>
    </div>
    <div class="card">
      <div class="box rotate">rotate</div>
    </div>
    <div class="card">
      <div class="box skew">skew</div>
    </div>
    <div class="card">
      <div class="box skewX">skewX</div>
    </div>
    <div class="card">
      <div class="box skewY">skewY</div>
    </div>
    <div class="card">
      <div class="box matrix3d">matrix3d</div>
    </div>
    <div class="card">
      <div class="box translate3d">translate3d</div>
    </div>
    <div class="card">
      <div class="box rotateY">rotateY</div>
    </div>
    <div class="card">
      <div class="box rotateX">rotateX</div>
    </div>
    <div class="card">
      <div class="box translateZ">translateZ</div>
    </div>

  </div>

</body>

</html>
